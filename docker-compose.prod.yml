# Production stack with external PostgreSQL (managed DB).
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Do not set POSTGRES_* — DATABASE_URL must point to your managed instance.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTO_CREATE_DB: "false"
      ENVIRONMENT: production
      SQL_ECHO: "false"
      RUN_MIGRATIONS_ON_STARTUP: "true"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AVATARS_DIR: /app/avatars
      PORTFOLIO_DIR: /app/portfolio
      UPLOADS_FOLDER: /app/uploads
      FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND:-local}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
    volumes:
      - avatars_data:/app/avatars
      - portfolio_data:/app/portfolio
      - uploads_data:/app/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_URL: ${PUBLIC_API_URL}
        REACT_APP_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/reverse-proxy-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  avatars_data:
  portfolio_data:
  uploads_data:
  certbot_webroot:
