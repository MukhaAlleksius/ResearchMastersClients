name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      - name: Run tests
        run: poetry run pytest tests -q
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
          PUBLIC_API_URL: http://localhost:8000
          PAYMENT_CALLBACK_SECRET: ci-payment-callback-secret

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          REACT_APP_API_URL: "/api"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile .
      - name: Build frontend image
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg REACT_APP_API_URL=http://localhost/api .
